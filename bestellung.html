<section class="order-section">

  <h2>Unverbindliche Anfrage</h2>

  <p class="order-intro">
    Sie möchten Calm Sphere an Ihrer Schule einsetzen?
    Senden Sie uns eine Anfrage – wir melden uns zeitnah mit weiteren Informationen.
  </p>

  <div class="order-box">

    <form>
      <input type="text" placeholder="Name der Schule" required>
      <input type="text" placeholder="Ansprechperson">
      <input type="email" placeholder="E-Mail-Adresse" required>

      <select>
        <option>Interesse an...</option>
        <option>CalmKit</option>
        <option>Rescue Cards</option>
        <option>Silent Cabins</option>
        <option>Rescue App</option>
      </select>

      <textarea rows="5" placeholder="Weitere Informationen oder Fragen"></textarea>

      <button type="submit" class="button">Anfrage senden</button>
    </form>

  </div>
</section>
